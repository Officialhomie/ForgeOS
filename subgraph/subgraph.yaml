specVersion: 0.0.4
description: ForgeOS on-chain indexer — OSKernel delegations, AgentTreasury payments, ForgeOSRegistry agents. Ethereum Sepolia (11155111).
repository: https://github.com/forgeos/forgeos

schema:
  file: ./schema.graphql

dataSources:
  # ─── OSKernel ───────────────────────────────────────────────────────────────
  - kind: ethereum
    name: OSKernel
    network: sepolia
    source:
      address: "0xcFC6BECB0054D6e313a88c70CcE1d477D8752382"
      abi: OSKernel
      startBlock: 10934090
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Delegation
        - KnownDelegatee
        - KernelState
        - ActivityEvent
      abis:
        - name: OSKernel
          file: ./abis/OSKernel.json
      eventHandlers:
        - event: "DelegationGranted(indexed bytes32,indexed address,indexed address)"
          handler: handleDelegationGranted
        - event: "DelegationRevoked(indexed bytes32)"
          handler: handleDelegationRevoked
        - event: "AllDelegationsRevoked(indexed address,uint256)"
          handler: handleAllDelegationsRevoked
      file: ./src/mappings/os-kernel.ts

  # ─── AgentTreasury ──────────────────────────────────────────────────────────
  - kind: ethereum
    name: AgentTreasury
    network: sepolia
    source:
      address: "0xe0DD408BE8cb3Dfe6441FEfE1e209E886F48071A"
      abi: AgentTreasury
      startBlock: 10934090
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TreasuryState
        - TreasuryEvent
        - ActivityEvent
      abis:
        - name: AgentTreasury
          file: ./abis/AgentTreasury.json
      eventHandlers:
        - event: "TreasuryFunded(indexed address,uint256)"
          handler: handleTreasuryFunded
        - event: "PaymentExecuted(indexed address,uint256,indexed bytes32)"
          handler: handlePaymentExecuted
        - event: "RevenueDistributed(uint256,uint256,uint256)"
          handler: handleRevenueDistributed
        - event: "AgentBudgetSet(indexed bytes32,uint256)"
          handler: handleAgentBudgetSet
      file: ./src/mappings/treasury.ts

  # ─── ForgeOSRegistry ────────────────────────────────────────────────────────
  - kind: ethereum
    name: ForgeOSRegistry
    network: sepolia
    source:
      address: "0x4668B4Dd600FB4404783a9C73B6b4fcb71e78347"
      abi: ForgeOSRegistry
      startBlock: 10934090
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agent
        - ActivityEvent
      abis:
        - name: ForgeOSRegistry
          file: ./abis/ForgeOSRegistry.json
      eventHandlers:
        - event: "AgentRegistered(indexed bytes32,indexed address,string)"
          handler: handleAgentRegistered
        - event: "AgentDeactivated(indexed bytes32)"
          handler: handleAgentDeactivated
      file: ./src/mappings/registry.ts
