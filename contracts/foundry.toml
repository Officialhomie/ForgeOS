[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.23"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@metamask/delegation-framework/=lib/delegation-framework/src/",
    "@openzeppelin/contracts/=lib/delegation-framework/lib/openzeppelin-contracts/contracts/",
    "@account-abstraction/=lib/delegation-framework/lib/account-abstraction/contracts/",
    "@erc7579/=lib/delegation-framework/lib/erc7579-implementation/src/",
    "forge-std/=lib/delegation-framework/lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 64
depth = 15

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
base-sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
